<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220">
<defs>
<pattern id="stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
<rect width="5" height="10" fill="#192d56"/>
<rect x="5" width="5" height="10" fill="#25538e"/>
<animateTransform attributeName="patternTransform" type="translate" values="0 0;-200 0;0 0" dur="10s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.5;1"/>
</pattern>
<filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="100%" height="100%" fill="black"/>
<text x="50%" y="55%" text-anchor="middle"
font-family="'Press Start 2P','Pixel Emulator',monospace"
font-size="56" font-weight="700"
fill="url(#stripes)"
stroke="#BE98B6" stroke-width="1"
letter-spacing="4"
filter="url(#glow)">
AD ASTRA PER ASPERA
</text>
</svg>
